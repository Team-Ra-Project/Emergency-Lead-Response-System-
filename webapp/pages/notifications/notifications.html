<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notifications — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/tables.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div id="shell"></div>
  <script src="../../js/app.js"></script>
  <script>
  (async function () {
    const me = await mountShell('notif');
    const canSend = ['ADMIN','BUSINESS_OWNER'].includes(me.role);

    document.getElementById('content').innerHTML = `
      <div class="page-header"><h1>Notifications</h1></div>
      ${canSend ? `
      <div class="card" style="margin-bottom:16px">
        <h3 style="margin-bottom:12px">Send notification</h3>
        <form id="sendForm" class="grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <label>Recipient
            <select name="userId" required id="recipientSel"><option value="">Loading…</option></select>
          </label>
          <label>Channel
            <select name="channel" required>
              <option value="BROWSER">In-app (Browser)</option>
              <option value="EMAIL">Email</option>
              <option value="SMS">SMS</option>
              <option value="WHATSAPP">WhatsApp</option>
            </select>
          </label>
          <label style="grid-column:1/-1">Title
            <input name="title" required maxlength="120" />
          </label>
          <label style="grid-column:1/-1">Message
            <textarea name="message" required rows="3" maxlength="1000"></textarea>
          </label>
          <div style="grid-column:1/-1">
            <button class="btn btn-primary" type="submit">Send</button>
          </div>
        </form>
      </div>` : ''}
      <div class="card" id="notifList">Loading…</div>`;

    if (canSend) {
      try {
        const users = await API.get('/api/users');
        document.getElementById('recipientSel').innerHTML =
          '<option value="">Select user…</option>' +
          users.map(u => `<option value="${u.userId}">${esc(u.fullName)} (${esc(u.email)})</option>`).join('');
      } catch (e) { toast(e.message, 'error'); }

      document.getElementById('sendForm').onsubmit = async (ev) => {
        ev.preventDefault();
        const f = ev.currentTarget;
        const body = {
          userId:  f.userId.value,
          channel: f.channel.value,
          title:   f.title.value.trim(),
          message: f.message.value.trim()
        };
        if (!body.userId || !body.title || !body.message) { toast('Fill all fields','error'); return; }
        try {
          await API.post('/api/notifications', body);
          toast('Notification sent','success');
          f.reset();
          load(); refreshUnread();
        } catch (e) { toast(e.message,'error'); }
      };
    }

    async function load() {
      try {
        const list = await API.get('/api/notifications');
        const host = document.getElementById('notifList');
        if (!list.length) { host.innerHTML = '<div class="empty-state">No notifications yet</div>'; return; }
        host.innerHTML = list.map(n => `
          <div class="flex justify-between items-center" style="padding:12px 0;border-bottom:1px solid var(--border);">
            <div>
              <div style="font-weight:${n.read?'400':'600'}">${esc(n.title||'Notification')}</div>
              <div class="text-secondary" style="font-size:13px;white-space:pre-line">${esc(n.message||'')}</div>
              <div class="text-secondary" style="font-size:11px;margin-top:4px">
                ${esc(n.channel)} · ${esc(n.createdAt)}
              </div>
            </div>
            ${n.read ? '' : `<button class="btn btn-secondary" data-read="${n.id}">Mark read</button>`}
          </div>`).join('');
        host.querySelectorAll('[data-read]').forEach(b => b.onclick = async () => {
          try { await API.put('/api/notifications/' + b.dataset.read); load(); refreshUnread(); }
          catch (e) { toast(e.message, 'error'); }
        });
      } catch (e) { toast(e.message,'error'); }
    }
    load();
  })();
  </script>
</body>
</html>
