<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/tables.css" />
  <link rel="stylesheet" href="../../css/forms.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <style>
      .settings-page-header p {
        margin: 8px 0 0;
        color: var(--color-text-muted);
      }
      .settings-card {
        border: 1px solid var(--color-border);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-soft);
        transition:
          transform var(--transition-base),
          box-shadow var(--transition-base);
      }
      .settings-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 34px rgba(10, 10, 35, 0.08);
      }
      .section-icon {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(108, 92, 231, 0.1);
        color: var(--color-primary);
      }
      .form-label {
        color: var(--color-text);
        font-weight: 600;
      }
      .form-control,
      .form-select {
        border-color: var(--color-border);
        border-radius: var(--radius-control);
        min-height: 42px;
      }
      .form-control:focus,
      .form-select:focus,
      .form-check-input:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.14);
      }
      .form-check-input:checked {
        background-color: var(--color-primary);
        border-color: var(--color-primary);
      }
      .theme-option {
        position: relative;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-card);
        padding: 16px;
        cursor: pointer;
        transition:
          border-color var(--transition-base),
          background var(--transition-base),
          transform var(--transition-base);
      }
      .theme-option:hover {
        border-color: rgba(108, 92, 231, 0.34);
        background: #fafafc;
        transform: translateY(-1px);
      }
      .theme-option input {
        position: absolute;
        top: 16px;
        right: 16px;
      }
      .theme-swatch {
        height: 58px;
        border-radius: 8px;
        margin-bottom: 12px;
        border: 1px solid var(--color-border);
      }
      .theme-light {
        background: linear-gradient(90deg, #fff 0 65%, #f5f6fa 65%);
      }
      .theme-dark {
        background: linear-gradient(90deg, #0a0a23 0 65%, #12122e 65%);
      }
      .theme-system {
        background: linear-gradient(90deg, #fff 0 50%, #0a0a23 50%);
      }
      .btn-elrs {
        border: 0;
        border-radius: var(--radius-control);
        background: var(--color-primary);
        color: #fff;
        font-weight: 600;
        transition:
          transform var(--transition-base),
          background var(--transition-base),
          box-shadow var(--transition-base);
      }
      .btn-elrs:hover {
        background: var(--color-primary-hover);
        color: #fff;
        transform: translateY(-1px);
        box-shadow: var(--shadow-soft);
      }
      .btn-elrs-outline {
        border: 1px solid var(--color-border);
        border-radius: var(--radius-control);
        background: #fff;
        color: var(--color-text);
        font-weight: 600;
        transition:
          transform var(--transition-base),
          border-color var(--transition-base),
          color var(--transition-base),
          box-shadow var(--transition-base);
      }
      .btn-elrs-outline:hover {
        border-color: rgba(108, 92, 231, 0.34);
        color: var(--color-primary);
        transform: translateY(-1px);
        box-shadow: var(--shadow-soft);
      }
    </style>
</head>
<body>
  <div id="shell"></div>
  <template id="page-content">
<div class="content__inner">
<div class="page-header settings-page-header">
<div>
<nav aria-label="Breadcrumb" class="breadcrumb">
<ol>
<li><a href="../index.html">Dashboard</a></li>
<li aria-current="page">Settings</li>
</ol>
</nav>
<h1>Settings</h1>
<p>Configure ELRS preferences and account controls.</p>
</div>
</div>
<form>
<div class="row g-4">
<div class="col-12 col-xl-6">
<section class="card settings-card h-100">
<div class="card-body p-4">
<div class="d-flex align-items-center gap-3 mb-4">
<span class="section-icon"><i class="fa-solid fa-building"></i></span>
<h2 class="h5 fw-bold mb-0">General</h2>
</div>
<div class="row g-3">
<div class="col-12">
<label class="form-label" for="org-name">Organization Name</label><input class="form-control" id="org-name" value="Emergency Lead Response System"/>
</div>
<div class="col-12">
<label class="form-label" for="org-address">Organization Address</label><textarea class="form-control" id="org-address" rows="3">
2nd Floor, Response Center, Mumbai, Maharashtra</textarea>
</div>
<div class="col-md-6">
<label class="form-label" for="timezone">Time Zone</label><select class="form-select" id="timezone">
<option selected="">Asia/Kolkata (IST)</option>
<option>UTC</option>
<option>America/New_York</option>
<option>Europe/London</option>
</select>
</div>
<div class="col-md-6">
<label class="form-label" for="language">Language</label><select class="form-select" id="language">
<option selected="">English</option>
<option>Hindi</option>
<option>Spanish</option>
<option>French</option>
</select>
</div>
</div>
</div>
</section>
</div>
<div class="col-12 col-xl-6">
<section class="card settings-card h-100">
<div class="card-body p-4">
<div class="d-flex align-items-center gap-3 mb-4">
<span class="section-icon"><i class="fa-solid fa-bell"></i></span>
<h2 class="h5 fw-bold mb-0">Notifications</h2>
</div>
<div class="vstack gap-3">
<div class="form-check form-switch">
<input checked="" class="form-check-input" id="email-notifications" type="checkbox"/><label class="form-check-label fw-semibold" for="email-notifications">Email Notifications</label>
</div>
<div class="form-check form-switch">
<input checked="" class="form-check-input" id="sms-notifications" type="checkbox"/><label class="form-check-label fw-semibold" for="sms-notifications">SMS Notifications</label>
</div>
<div class="form-check form-switch">
<input class="form-check-input" id="desktop-notifications" type="checkbox"/><label class="form-check-label fw-semibold" for="desktop-notifications">Desktop Notifications</label>
</div>
</div>
</div>
</section>
</div>
<div class="col-12 col-xl-6">
<section class="card settings-card h-100">
<div class="card-body p-4">
<div class="d-flex align-items-center gap-3 mb-4">
<span class="section-icon"><i class="fa-solid fa-lock"></i></span>
<h2 class="h5 fw-bold mb-0">Security</h2>
</div>
<div class="vstack gap-3 mb-3">
<div class="form-check form-switch">
<input checked="" class="form-check-input" id="strong-password" type="checkbox"/><label class="form-check-label fw-semibold" for="strong-password">Strong Password</label>
</div>
<div class="form-check form-switch">
<input class="form-check-input" id="two-factor" type="checkbox"/><label class="form-check-label fw-semibold" for="two-factor">Two-Factor Authentication</label>
</div>
</div>
<label class="form-label" for="session-timeout">Session Timeout</label><select class="form-select" id="session-timeout">
<option>15 minutes</option>
<option selected="">30 minutes</option>
<option>1 hour</option>
<option>4 hours</option>
</select>
</div>
</section>
</div>
<div class="col-12 col-xl-6">
<section class="card settings-card h-100">
<div class="card-body p-4">
<div class="d-flex align-items-center gap-3 mb-4">
<span class="section-icon"><i class="fa-solid fa-palette"></i></span>
<h2 class="h5 fw-bold mb-0">Appearance</h2>
</div>
<div class="row g-3">
<div class="col-md-4">
<label class="theme-option d-block"><input checked="" class="form-check-input" name="theme" type="radio"/><span class="theme-swatch theme-light d-block"></span><strong>Light Theme</strong></label>
</div>
<div class="col-md-4">
<label class="theme-option d-block"><input class="form-check-input" name="theme" type="radio"/><span class="theme-swatch theme-dark d-block"></span><strong>Dark Theme</strong></label>
</div>
<div class="col-md-4">
<label class="theme-option d-block"><input class="form-check-input" name="theme" type="radio"/><span class="theme-swatch theme-system d-block"></span><strong>System Theme</strong></label>
</div>
</div>
</div>
</section>
</div>
</div>
<div class="d-flex flex-wrap justify-content-end gap-2 mt-4">
<button class="btn btn-elrs-outline px-4" type="reset">
<i class="fa-solid fa-rotate-left me-2"></i>Reset</button><button class="btn btn-elrs px-4" type="button">
<i class="fa-solid fa-floppy-disk me-2"></i>Save Settings
                </button>
</div>
</form>
</div>
</template>
  <script src="../../js/app.js"></script>
  <script>
    mountShell('settings').then(function () {
      var tpl = document.getElementById('page-content');
      var target = document.getElementById('content');
      target.innerHTML = tpl.innerHTML;
      tpl.remove();
      document.dispatchEvent(new CustomEvent('elrs:page-ready'));
    }).catch(function(err){ console.error(err); });
  </script>
</body>
</html>
