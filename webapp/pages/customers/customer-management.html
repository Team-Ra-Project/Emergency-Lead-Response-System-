<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customers — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/tables.css" />
  <link rel="stylesheet" href="../../css/forms.css" />
  <link rel="stylesheet" href="../../css/customer-management.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
</head>
<body>
  <div id="shell"></div>
  <template id="page-content">
<div class="content__inner">
<div class="page-header customer-page-header">
<div>
<nav aria-label="Breadcrumb" class="breadcrumb">
<ol>
<li><a href="../index.html">Dashboard</a></li>
<li aria-current="page">Customer Management</li>
</ol>
</nav>
<h1>Customer Management</h1>
<p>Manage customer information, history and relationships.</p>
</div>
</div>
<section aria-label="Customer management workspace" class="customer-management">
<!-- Action Bar -->
<div aria-label="Customer table controls" class="customer-toolbar">
<div class="customer-search-field">
<label class="sr-only" for="customer-search">Search customers</label>
<span aria-hidden="true" class="customer-search-field__icon">
<svg focusable="false" viewbox="0 0 24 24"><path d="M10.5 4a6.5 6.5 0 0 1 5.1 10.5l4 4-1.4 1.4-4-4A6.5 6.5 0 1 1 10.5 4Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z"></path></svg>
</span>
<input autocomplete="off" id="customer-search" placeholder="Search customer by name, phone, email or customer ID..." type="search"/>
</div>
<div class="customer-filter-field">
<label class="sr-only" for="customer-filter">Filter customers</label>
<select aria-label="Filter customers by type or status" id="customer-filter">
<option value="All Customers">All Customers</option>
<option value="Active">Active</option>
<option value="Inactive">Inactive</option>
<option value="VIP">VIP</option>
<option value="New">New</option>
<option value="Existing">Existing</option>
</select>
</div>
<button class="button button--primary" data-open-modal="" type="button">
<span aria-hidden="true">+</span>
                Add Customer
              </button>
</div>
<!-- Statistics Cards -->
<section aria-label="Customer statistics" class="customer-stats">
<article class="stat-card">
<span aria-hidden="true" class="stat-card__icon stat-card__icon--info">
<svg focusable="false" viewbox="0 0 24 24"><path d="M16 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4ZM8 12a3 3 0 1 0-3-3 3 3 0 0 0 3 3Zm8 2c-3.1 0-6 1.6-6 3.7V20h12v-2.3c0-2.1-2.9-3.7-6-3.7ZM8 14c-2.7 0-5 1.3-5 3v3h5v-2.3a4 4 0 0 1 1.5-3A6.9 6.9 0 0 0 8 14Z"></path></svg>
</span>
<div>
<p>Total Customers</p>
<strong>1,284</strong>
<span>+9% this month</span>
</div>
</article>
<article class="stat-card">
<span aria-hidden="true" class="stat-card__icon stat-card__icon--new">
<svg focusable="false" viewbox="0 0 24 24"><path d="M11 3h2v8h8v2h-8v8h-2v-8H3v-2h8V3Z"></path></svg>
</span>
<div>
<p>New Customers</p>
<strong>48</strong>
<span>12 added today</span>
</div>
</article>
<article class="stat-card">
<span aria-hidden="true" class="stat-card__icon stat-card__icon--vip">
<svg focusable="false" viewbox="0 0 24 24"><path d="M12 2 9.2 8.4 2 9.1l5.4 4.7L5.8 21 12 17.2 18.2 21l-1.6-7.2L22 9.1l-7.2-.7L12 2Z"></path></svg>
</span>
<div>
<p>VIP Customers</p>
<strong>156</strong>
<span>+6 upgraded this week</span>
</div>
</article>
<article class="stat-card">
<span aria-hidden="true" class="stat-card__icon stat-card__icon--inactive">
<svg focusable="false" viewbox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm5 11H7v-2h10v2Z"></path></svg>
</span>
<div>
<p>Inactive Customers</p>
<strong>72</strong>
<span>-4% from last month</span>
</div>
</article>
</section>
<!-- Customer Table -->
<section aria-labelledby="customer-table-title" class="customer-table-card">
<div class="customer-table-card__header">
<div>
<h2 id="customer-table-title">All Customers</h2>
<p><span data-result-count="">0</span> records found</p>
</div>
</div>
<div class="customer-table-scroll">
<table class="customer-table">
<thead>
<tr>
<th scope="col">Customer ID</th>
<th scope="col">Customer Name</th>
<th scope="col">Phone Number</th>
<th scope="col">Email Address</th>
<th scope="col">Address</th>
<th scope="col">Linked Leads</th>
<th scope="col">Appointments</th>
<th scope="col">Customer Type</th>
<th scope="col">Status</th>
<th scope="col">Created Date</th>
<th scope="col">Actions</th>
</tr>
</thead>
<tbody data-customer-table-body=""></tbody>
</table>
</div>
<!-- Empty State -->
<div class="customer-empty-state" data-empty-state="" hidden="">
<div aria-hidden="true" class="customer-empty-state__illustration">
<svg focusable="false" viewbox="0 0 80 80">
<path d="M40 8a24 24 0 1 0 0 48 24 24 0 0 0 0-48Zm0 12a8 8 0 1 1 0 16 8 8 0 0 1 0-16Zm0 30a18 18 0 0 1-13-5.6C29 39.8 34 37 40 37s11 2.8 13 7.4A18 18 0 0 1 40 50Z"></path>
<path d="M18 66h44v6H18z"></path>
</svg>
</div>
<p>No customers found.</p>
<button class="button button--primary" data-open-modal="" type="button">
<span aria-hidden="true">+</span>
                  Add Customer
                </button>
</div>
<!-- Pagination -->
<nav aria-label="Customer table pagination" class="pagination">
<button type="button">Previous</button>
<button aria-current="page" class="pagination__page pagination__page--active" type="button">1</button>
<button class="pagination__page" type="button">2</button>
<button class="pagination__page" type="button">3</button>
<button type="button">Next</button>
</nav>
</section>
</section>
</div>
</template>
  <script src="../../js/app.js"></script>
  <script>
    mountShell('customers').then(function () {
      var tpl = document.getElementById('page-content');
      var target = document.getElementById('content');
      target.innerHTML = tpl.innerHTML;
      tpl.remove();
      document.dispatchEvent(new CustomEvent('elrs:page-ready'));
      var s=document.createElement("script"); s.src="../../js/customer-management.js"; document.body.appendChild(s);
    }).catch(function(err){ console.error(err); });
  </script>
</body>
</html>
