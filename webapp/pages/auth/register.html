<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/auth.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="../../images/logo.png" alt="ELRS" />
        <h1>ELRS</h1>
        <p>Create your account</p>
      </div>

      <h2>Sign up</h2>
      <p class="subtitle">Get started in seconds. It's free.</p>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="fullName">Full name <span class="req">*</span></label>
          <input class="form-control" id="fullName" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="email">Email <span class="req">*</span></label>
            <input class="form-control" type="email" id="email" required />
          </div>
          <div class="form-group">
            <label for="phone">Phone <span class="req">*</span></label>
            <input class="form-control" type="tel" id="phone" required />
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password <span class="req">*</span></label>
          <input class="form-control" type="password" id="password" required />
          <div class="help-text">At least 8 characters.</div>
        </div>
        <div class="form-group">
          <label for="role">I am a</label>
          <select class="form-control" id="role">
            <option value="CUSTOMER">Customer</option>
            <option value="BUSINESS_OWNER">Business Owner</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <script src="../../js/validation.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/auth.js"></script>
</body>
</html>
