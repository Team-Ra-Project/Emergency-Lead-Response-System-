<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/auth.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="../../images/logo.png" alt="ELRS" />
        <h1>Set a new password</h1>
      </div>
      <form id="resetForm" novalidate>
        <input type="hidden" id="token" />
        <div class="form-group">
          <label for="password">New password <span class="req">*</span></label>
          <input class="form-control" type="password" id="password" required />
          <div class="help-text">At least 8 characters.</div>
        </div>
        <div class="form-group">
          <label for="confirm">Confirm password <span class="req">*</span></label>
          <input class="form-control" type="password" id="confirm" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Update password</button>
      </form>
      <p class="auth-footer"><a href="login.html">Back to sign in</a></p>
    </div>
  </div>
  <script src="../../js/validation.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/auth.js"></script>
</body>
</html>
