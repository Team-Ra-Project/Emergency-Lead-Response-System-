<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/auth.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="../../images/logo.png" alt="ELRS" />
        <h1>Reset your password</h1>
      </div>
      <p class="subtitle">Enter your email and we'll send you a reset link.</p>
      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="email">Email <span class="req">*</span></label>
          <input class="form-control" type="email" id="email" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
      </form>
      <div id="devLink" class="help-text" style="margin-top:16px"></div>
      <p class="auth-footer"><a href="login.html">← Back to sign in</a></p>
    </div>
  </div>
  <script src="../../js/validation.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/auth.js"></script>
</body>
</html>
