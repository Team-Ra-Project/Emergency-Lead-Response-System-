<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/auth.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="../../images/logo.png" alt="ELRS" />
        <h1>ELRS</h1>
        <p>Emergency Lead Response System</p>
      </div>

      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to manage your leads and bookings.</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email <span class="req">*</span></label>
          <input class="form-control" type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password <span class="req">*</span></label>
          <input class="form-control" type="password" id="password" name="password" required autocomplete="current-password" />
        </div>
        <div class="flex justify-between mb-4">
          <label class="text-secondary" style="font-size:13px;">
            <input type="checkbox" id="remember"/> Remember me
          </label>
          <a href="forgot-password.html">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Sign in</button>
      </form>

      <p class="auth-footer">
        New to ELRS? <a href="register.html">Create an account</a>
      </p>
    </div>
  </div>

  <script src="../../js/validation.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/auth.js"></script>
</body>
</html>
