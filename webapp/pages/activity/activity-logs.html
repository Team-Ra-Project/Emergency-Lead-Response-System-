<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Activity Logs — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/tables.css" />
  <link rel="stylesheet" href="../../css/forms.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <style>
      .logs-page-header p {
        margin: 8px 0 0;
        color: var(--color-text-muted);
      }
      .logs-card {
        border: 1px solid var(--color-border);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
      }
      .logs-toolbar {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) minmax(180px, 220px) auto auto;
        gap: 12px;
        padding: 20px;
        border-bottom: 1px solid var(--color-border);
        background: var(--color-card);
      }
      .search-control {
        position: relative;
      }
      .search-control i {
        position: absolute;
        top: 50%;
        left: 14px;
        color: var(--color-text-muted);
        transform: translateY(-50%);
      }
      .search-control .form-control {
        padding-left: 40px;
      }
      .form-control,
      .form-select {
        min-height: 42px;
        border-color: var(--color-border);
        border-radius: var(--radius-control);
      }
      .form-control:focus,
      .form-select:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.14);
      }
      .btn-elrs {
        border: 0;
        border-radius: var(--radius-control);
        background: var(--color-primary);
        color: #fff;
        font-weight: 600;
        transition:
          transform var(--transition-base),
          background var(--transition-base),
          box-shadow var(--transition-base);
      }
      .btn-elrs:hover {
        background: var(--color-primary-hover);
        color: #fff;
        transform: translateY(-1px);
        box-shadow: var(--shadow-soft);
      }
      .btn-elrs-outline {
        border: 1px solid var(--color-border);
        border-radius: var(--radius-control);
        background: #fff;
        color: var(--color-text);
        font-weight: 600;
        transition:
          transform var(--transition-base),
          border-color var(--transition-base),
          color var(--transition-base),
          box-shadow var(--transition-base);
      }
      .btn-elrs-outline:hover {
        border-color: rgba(108, 92, 231, 0.34);
        color: var(--color-primary);
        transform: translateY(-1px);
        box-shadow: var(--shadow-soft);
      }
      .logs-table {
        min-width: 980px;
        margin: 0;
      }
      .logs-table thead th {
        background: #fafafc;
        color: var(--color-text-muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .logs-table th,
      .logs-table td {
        padding: 16px;
        border-color: var(--color-border);
        vertical-align: middle;
      }
      .logs-table tbody tr {
        transition:
          background var(--transition-base),
          transform var(--transition-base);
      }
      .logs-table tbody tr:hover {
        background: #fafafc;
      }
      .sort-icon {
        margin-left: 6px;
        color: #9ca3af;
        font-size: 11px;
      }
      .log-id {
        color: var(--color-primary);
        font-weight: 700;
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 5px 11px;
        font-size: 12px;
        font-weight: 700;
      }
      .status-success {
        background: rgba(34, 197, 94, 0.12);
        color: var(--color-success);
      }
      .status-warning {
        background: rgba(245, 158, 11, 0.14);
        color: var(--color-warning);
      }
      .status-danger {
        background: rgba(239, 68, 68, 0.12);
        color: var(--color-danger);
      }
      .status-info {
        background: rgba(59, 130, 246, 0.12);
        color: var(--color-info);
      }
      .pagination .page-link {
        border-color: var(--color-border);
        color: var(--color-text);
      }
      .pagination .active .page-link,
      .pagination .page-link:hover {
        background: var(--color-primary);
        border-color: var(--color-primary);
        color: #fff;
      }
      @media (max-width: 960px) {
        .logs-toolbar {
          grid-template-columns: 1fr 1fr;
        }
      }
      @media (max-width: 576px) {
        .logs-toolbar {
          grid-template-columns: 1fr;
          padding: 16px;
        }
        .logs-toolbar .btn {
          width: 100%;
        }
      }
    </style>
</head>
<body>

</div>
<div class="d-flex flex-wrap align-items-center justify-content-between gap-3 p-3 border-top">

</section>

</template>
  <script src="../../js/app.js"></script>
  <script>
    mountShell('activity').then(function () {
      var tpl = document.getElementById('page-content');
      var target = document.getElementById('content');
      target.innerHTML = tpl.innerHTML;
      tpl.remove();
      document.dispatchEvent(new CustomEvent('elrs:page-ready'));
    }).catch(function(err){ console.error(err); });
  </script>
</body>
</html>
