<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Staff — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div id="shell"></div>
  <script src="../../js/app.js"></script>
  <script src="../../js/validation.js"></script>
  <script>
  (async function () {
    await mountShell('staff');
    document.getElementById('content').innerHTML = `
      <div class="page-header">
        <div>
          <h1>Add Staff</h1>
          <div class="text-secondary">Create a new staff account with STAFF role</div>
        </div>
        <a href="staff-list.html" class="btn btn-secondary">← Back</a>
      </div>
      <div class="card" style="max-width:720px">
        <form id="staffForm" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label>Full name <span class="req">*</span></label>
              <input class="form-control" id="fullName" required />
            </div>
            <div class="form-group">
              <label>Designation</label>
              <input class="form-control" id="designation" placeholder="e.g. Field Technician" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Email <span class="req">*</span></label>
              <input class="form-control" type="email" id="email" required />
            </div>
            <div class="form-group">
              <label>Phone <span class="req">*</span></label>
              <input class="form-control" id="phone" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Specialization</label>
              <input class="form-control" id="specialization" placeholder="e.g. Plumbing, Electrician" />
            </div>
            <div class="form-group">
              <label>Availability</label>
              <select class="form-control" id="availability">
                <option value="AVAILABLE">Available</option>
                <option value="BUSY">Busy</option>
                <option value="OFF">Off</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Temporary password</label>
            <input class="form-control" type="text" id="password" value="Staff@123" />
            <div class="help-text">Staff can change it after first login.</div>
          </div>
          <div class="form-actions">
            <a class="btn btn-secondary" href="staff-list.html">Cancel</a>
            <button class="btn btn-primary" type="submit">Save Staff</button>
          </div>
        </form>
      </div>`;

    document.getElementById('staffForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const body = {
        fullName: f.fullName.value.trim(),
        email:    f.email.value.trim(),
        phone:    f.phone.value.trim(),
        designation: f.designation.value.trim(),
        specialization: f.specialization.value.trim(),
        availability: f.availability.value,
        password: f.password.value
      };
      let ok = true;
      if (!V.required(body.fullName)) { showFieldError(f.fullName,'Required'); ok=false; } else showFieldError(f.fullName,'');
      if (!V.email(body.email))       { showFieldError(f.email,'Invalid'); ok=false; }    else showFieldError(f.email,'');
      if (!V.phone(body.phone))       { showFieldError(f.phone,'Invalid'); ok=false; }    else showFieldError(f.phone,'');
      if (!ok) return;
      try {
        await API.post('/api/staff', body);
        toast('Staff added', 'success');
        setTimeout(() => goto('/pages/staff/staff-list.html'), 600);
      } catch (err) { toast(err.message, 'error'); }
    });
  })();
  </script>
</body>
</html>
