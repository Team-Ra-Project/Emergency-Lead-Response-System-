<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert lead</title>
 
  <link rel="stylesheet" href="../../css/advanceForms.css" />
  <link rel="stylesheet" href="../../css/advanceFromsRes.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
</head>
<body>


                     <h1 id = "ad">Add Lead</h1>
<div>

  <form id="leadForm"  action = "/ELRS/api/leads" method = "post">

   
    

   
    <div class="form-group">
        <label for="customerName">Customer Name</label>
        <input type = "text" id = "customerName" name = "customerName" placeholder = "Enter Customer Name" required>
    </div>


 

    
    <div class="form-group">
        <label for="mobileNumber">Mobile Number</label>
        <input type = "tel" id = "mobileNumber" name = "mobileNumber" placeholder = "Enter Mobile Number"  pattern="[0-9]{10}"
    maxlength="10" required>
        
    </div>
    
     <div class="form-group">
        <label for="email">Email</label>
        <input type = "email" id = "email" name = "email" placeholder = "Enter Email" required>
    </div>
    
     <div class="form-group">
        <label for="address">Address</label>
        <input type = "text" id = "address" name = "address" placeholder = "Enter Address" required>
    </div>
    
     <div class="form-group">
        <label for="service">Service</label>
        <select id="service" name="service" required>
    <option value="">Select Service</option>
    <option value="Ambulance">Ambulance</option>
    <option value="Fire Rescue">Fire Rescue</option>
    <option value="Medical Assistance">Medical Assistance</option>
    <option value="Police Assistance">Police Assistance</option>
</select>
    </div>

<div class="form-group">
        <label for="leadSource">Lead Source</label>
       <select id = "leadSource" name = "leadSource" required>
             <option value="">Select Lead Source</option>
    <option value="Website">Website</option>
    <option value="Phone Call">Phone Call</option>
    <option value="Email">Email</option>
    <option value="Walk-in">Walk-in</option>
    <option value="Referral">Referral</option>
    <option value="Social Media">Social Media</option>
    <option value="Partner">Partner</option>
    <option value="Other">Other</option>
       </select>
    </div>
    
    <div class="form-group">
        <label for="assignedTo">Assigned To</label>
       <select id = "assignedTo" name = "assignedTo" required>
             <option value="">Assign To</option>
    <option value="Emergency Coordinator">Emergency Coordinator</option>
    <option value="Field Executive">Field Executive</option>
    <option value="Support Executive">Support Executive</option>
    <option value="Operations Manager">Operations Manager</option>
    <option value="Admin">Admin</option>
       </select>
    </div>
    
    <div class="form-group">
        <label for="priority">Priority</label >
       <select id = "priority" name = "priority" required>
            <option value="">Select Priority</option>
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
    <option value="Critical">Critical</option>	
</select>
     
    </div>
    
    
    <div class="form-group">
        <label for="status">Status</label>
       <select id = "status" name = "status" required>
              <option value="">Select Status</option>
    <option value="New">New</option>
    <option value="Assigned">Assigned</option>
    <option value="In Progress">In Progress</option>
    <option value="On Hold">On Hold</option>
    <option value="Resolved">Resolved</option>
    <option value="Closed">Closed</option>
       </select>
    </div>
    
    <div class="form-group">
        <label for="description">Description</label>
       <textarea id = "description" name = "description"  rows = "6" cols = "30"  required></textarea>
    </div>
    

   <div class="form-actions">
   <button type="button" class="btn-back" onclick="window.location.href='lead-management.html'">
    ← Back 
</button>
    <button type="reset">Clear</button>
    <button type="submit">Save Lead</button>
    </div>

</form>
</div>
 <script src="../../js/app.js"></script>
<script src="../../js/api-core.js"></script>
<script src="../../js/lead-api.js"></script>
</body>
</html>
