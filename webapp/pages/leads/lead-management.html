<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leads — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/tables.css" />
  <link rel="stylesheet" href="../../css/forms.css" />
  <link rel="stylesheet" href="../../css/lead-management.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
</head>
<body>
  <div id="shell"></div>
  <template id="page-content">
<div class="content__inner">
<div class="page-header lead-page-header">
<div>
<nav aria-label="Breadcrumb" class="breadcrumb">
<ol>
<li><a href="../index.html">Dashboard</a></li>
<li aria-current="page">Lead Management</li>
</ol>
</nav>
<h1>Lead Management</h1>
<p>Manage, search and track all emergency leads.</p>
</div>
</div>
<section aria-label="Lead management workspace" class="lead-management">
<!-- Action Bar -->
<div aria-label="Lead table controls" class="lead-toolbar">
<div class="lead-search-field">
<label class="sr-only" for="lead-search">Search leads</label>
<span aria-hidden="true" class="lead-search-field__icon">
<svg focusable="false" viewbox="0 0 24 24"><path d="M10.5 4a6.5 6.5 0 0 1 5.1 10.5l4 4-1.4 1.4-4-4A6.5 6.5 0 1 1 10.5 4Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z"></path></svg>
</span>
<input autocomplete="off" id="lead-search" placeholder="Search by name, phone or email..." type="search"/>
</div>
<div class="lead-filter-field">
<label class="sr-only" for="status-filter">Filter by status</label>
<select aria-label="Filter leads by status" id="status-filter">
<option value="All">All</option>
<option value="New">New</option>
<option value="Contacted">Contacted</option>
<option value="Qualified">Qualified</option>
<option value="Quote Sent">Quote Sent</option>
<option value="Booked">Booked</option>
<option value="Completed">Completed</option>
<option value="Lost">Lost</option>
<option value="Pending">Pending</option>
</select>
</div>
<button class="button button--primary" data-open-modal="" type="button">
<span aria-hidden="true">+</span>
                Add Lead
              </button>
</div>
<!-- Statistics Cards -->
<section aria-label="Lead statistics" class="lead-stats">
<article class="stat-card">
<span aria-hidden="true" class="stat-card__icon stat-card__icon--info">
<svg focusable="false" viewbox="0 0 24 24"><path d="M4 5h16v14H4V5Zm3 4h10V7H7v2Zm0 4h10v-2H7v2Zm0 4h7v-2H7v2Z"></path></svg>
</span>
<div>
<p>Total Leads</p>
<strong>248</strong>
<span>+12% this month</span>
</div>
</article>
<article class="stat-card">
<span aria-hidden="true" class="stat-card__icon stat-card__icon--new">
<svg focusable="false" viewbox="0 0 24 24"><path d="M11 3h2v8h8v2h-8v8h-2v-8H3v-2h8V3Z"></path></svg>
</span>
<div>
<p>New Leads</p>
<strong>36</strong>
<span>8 waiting response</span>
</div>
</article>
<article class="stat-card">
<span aria-hidden="true" class="stat-card__icon stat-card__icon--qualified">
<svg focusable="false" viewbox="0 0 24 24"><path d="m9 16.2-3.5-3.5L4 14.2 9 19 20.5 7.5 19 6 9 16.2Z"></path></svg>
</span>
<div>
<p>Qualified Leads</p>
<strong>92</strong>
<span>+18 qualified today</span>
</div>
</article>
<article class="stat-card">
<span aria-hidden="true" class="stat-card__icon stat-card__icon--completed">
<svg focusable="false" viewbox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm-1 14.8-4-4 1.4-1.4 2.6 2.6 5.6-5.8L18 9.6l-7 7.2Z"></path></svg>
</span>
<div>
<p>Completed Leads</p>
<strong>64</strong>
<span>+7 completed this week</span>
</div>
</article>
</section>
<!-- Lead Table -->
<section aria-labelledby="lead-table-title" class="lead-table-card">
<div class="lead-table-card__header">
<h2 id="lead-table-title">All Leads</h2>
<p><span data-result-count="">0</span> records found</p>
</div>
<div class="lead-table-scroll">
<table class="lead-table">
<thead>
<tr>
<th scope="col">Lead ID</th>
<th scope="col">Customer Name</th>
<th scope="col">Phone</th>
<th scope="col">Email</th>
<th scope="col">Service</th>
<th scope="col">Assigned To</th>
<th scope="col">Status</th>
<th scope="col">Created Date</th>
<th scope="col">Actions</th>
</tr>
</thead>
<tbody data-lead-table-body=""></tbody>
</table>
</div>
<div class="lead-empty-state" data-empty-state="" hidden="">
                No leads match your current search.
              </div>
<!-- Pagination -->
<nav aria-label="Lead table pagination" class="pagination">
<button type="button">Previous</button>
<button aria-current="page" class="pagination__page pagination__page--active" type="button">1</button>
<button class="pagination__page" type="button">2</button>
<button class="pagination__page" type="button">3</button>
<button type="button">Next</button>
</nav>
</section>
</section>
</div>
</template>
  <script src="../../js/app.js"></script>
  <script>
    mountShell('leads').then(function () {
      var tpl = document.getElementById('page-content');
      var target = document.getElementById('content');
      target.innerHTML = tpl.innerHTML;
      tpl.remove();
      document.dispatchEvent(new CustomEvent('elrs:page-ready'));
      var s=document.createElement("script"); s.src="../../js/lead-management.js"; document.body.appendChild(s);
    }).catch(function(err){ console.error(err); });
  </script>
</body>
</html>
