<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/tables.css" />
  <link rel="stylesheet" href="../../css/forms.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <style>
      .profile-page-header p {
        margin: 8px 0 0;
        color: var(--color-text-muted);
      }
      .profile-card,
      .detail-card {
        border: 1px solid var(--color-border);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-soft);
        transition:
          transform var(--transition-base),
          box-shadow var(--transition-base);
      }
      .profile-card:hover,
      .detail-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 14px 34px rgba(10, 10, 35, 0.08);
      }
      .profile-photo-wrap {
        display: grid;
        justify-items: center;
        gap: 16px;
      }
      .profile-avatar {
        width: 132px;
        height: 132px;
        border: 5px solid rgba(108, 92, 231, 0.12);
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--color-sidebar-secondary),
          var(--color-primary)
        );
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 56px;
      }
      .btn-elrs {
        border: 0;
        border-radius: var(--radius-control);
        background: var(--color-primary);
        color: #fff;
        font-weight: 600;
        transition:
          transform var(--transition-base),
          background var(--transition-base),
          box-shadow var(--transition-base);
      }
      .btn-elrs:hover {
        background: var(--color-primary-hover);
        color: #fff;
        transform: translateY(-1px);
        box-shadow: var(--shadow-soft);
      }
      .btn-elrs-outline {
        border: 1px solid var(--color-border);
        border-radius: var(--radius-control);
        background: #fff;
        color: var(--color-text);
        font-weight: 600;
        transition:
          transform var(--transition-base),
          border-color var(--transition-base),
          color var(--transition-base),
          box-shadow var(--transition-base);
      }
      .btn-elrs-outline:hover {
        border-color: rgba(108, 92, 231, 0.34);
        color: var(--color-primary);
        transform: translateY(-1px);
        box-shadow: var(--shadow-soft);
      }
      .profile-name {
        margin: 0;
        color: var(--color-text);
        font-size: 24px;
        font-weight: 700;
      }
      .profile-role {
        color: var(--color-text-muted);
      }
      .profile-status {
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.12);
        color: var(--color-success);
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 700;
      }
      .info-item {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        padding: 16px;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-control);
        background: #fff;
        transition:
          background var(--transition-base),
          border-color var(--transition-base);
      }
      .info-item:hover {
        border-color: rgba(108, 92, 231, 0.28);
        background: #fafafc;
      }
      .info-icon {
        width: 38px;
        height: 38px;
        flex: 0 0 38px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(108, 92, 231, 0.1);
        color: var(--color-primary);
      }
      .info-label {
        margin: 0;
        color: var(--color-text-muted);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .info-value {
        margin: 2px 0 0;
        color: var(--color-text);
        font-weight: 600;
        word-break: break-word;
      }
    </style>
</head>
<body>
  <div id="shell"></div>
  <template id="page-content">
<div class="content__inner">
<div class="page-header profile-page-header">
<div>
<nav aria-label="Breadcrumb" class="breadcrumb">
<ol>
<li><a href="../index.html">Dashboard</a></li>
<li aria-current="page">Profile</li>
</ol>
</nav>
<h1>Profile</h1>
<p>View and manage your ELRS account details.</p>
</div>
</div>
<div class="row g-4">
<div class="col-12 col-xl-4">
<section class="card profile-card h-100">
<div class="card-body p-4 profile-photo-wrap text-center">
<div aria-label="Default profile avatar" class="profile-avatar">
<i class="fa-solid fa-user"></i>
</div>
<button class="btn btn-elrs-outline px-3" type="button">
<i class="fa-solid fa-camera me-2"></i>Edit Photo
                    </button>
<div>
<h2 class="profile-name">Kaustubh Gondhali </h2>
<p class="profile-role mb-3">Response Coordinator</p>
<span class="profile-status"><i class="fa-solid fa-circle-check me-1"></i>Active
                        Account</span>
</div>
<div class="d-grid gap-2 w-100 pt-2">
<button class="btn btn-elrs py-2" type="button">
<i class="fa-solid fa-pen-to-square me-2"></i>Edit
                        Profile
                      </button>
<button class="btn btn-elrs-outline py-2" type="button">
<i class="fa-solid fa-key me-2"></i>Change Password
                      </button>
</div>
</div>
</section>
</div>
<div class="col-12 col-xl-8">
<section class="card detail-card">
<div class="card-body p-4">
<h2 class="h5 fw-bold mb-4">Account Information</h2>
<div class="row g-3">
<div class="col-md-6">
<div class="info-item">
<span class="info-icon"><i class="fa-solid fa-id-badge"></i></span>
<div>
<p class="info-label">Employee ID</p>
<p class="info-value">ELRS-EMP-1042</p>
</div>
</div>
</div>
<div class="col-md-6">
<div class="info-item">
<span class="info-icon"><i class="fa-solid fa-envelope"></i></span>
<div>
<p class="info-label">Email</p>
<p class="info-value">kaustubh.gondhali@elrs.com</p>
</div>
</div>
</div>
<div class="col-md-6">
<div class="info-item">
<span class="info-icon"><i class="fa-solid fa-phone"></i></span>
<div>
<p class="info-label">Phone Number</p>
<p class="info-value">+91 98765 43210</p>
</div>
</div>
</div>
<div class="col-md-6">
<div class="info-item">
<span class="info-icon"><i class="fa-solid fa-building-user"></i></span>
<div>
<p class="info-label">Department</p>
<p class="info-value">Emergency Operations</p>
</div>
</div>
</div>
<div class="col-md-6">
<div class="info-item">
<span class="info-icon"><i class="fa-solid fa-user-shield"></i></span>
<div>
<p class="info-label">Role</p>
<p class="info-value">Response Coordinator</p>
</div>
</div>
</div>
<div class="col-md-6">
<div class="info-item">
<span class="info-icon"><i class="fa-solid fa-calendar-plus"></i></span>
<div>
<p class="info-label">Date Joined</p>
<p class="info-value">15 January 2024</p>
</div>
</div>
</div>
<div class="col-md-6">
<div class="info-item">
<span class="info-icon"><i class="fa-solid fa-signal"></i></span>
<div>
<p class="info-label">Account Status</p>
<p class="info-value text-success">Active</p>
</div>
</div>
</div>
<div class="col-md-6">
<div class="info-item">
<span class="info-icon"><i class="fa-solid fa-user"></i></span>
<div>
<p class="info-label">Full Name</p>
<p class="info-value">Kaustubh Gondhali</p>
</div>
</div>
</div>
</div>
</div>
</section>
</div>
</div>
</div>
</template>
  <script src="../../js/app.js"></script>
  <script>
    mountShell('profile').then(function () {
      var tpl = document.getElementById('page-content');
      var target = document.getElementById('content');
      target.innerHTML = tpl.innerHTML;
      tpl.remove();
      document.dispatchEvent(new CustomEvent('elrs:page-ready'));
    }).catch(function(err){ console.error(err); });
  </script>
</body>
</html>
