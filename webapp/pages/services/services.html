<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Services — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/tables.css" />
  <link rel="stylesheet" href="../../css/forms.css" />
  <link rel="stylesheet" href="../../css/services.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
</head>
<body>
  <div id="shell"></div>
  <template id="page-content">
<div class="content__inner">
<div class="page-header service-page-header">
<div>
<nav aria-label="Breadcrumb" class="breadcrumb">
<ol>
<li><a href="../index.html">Dashboard</a></li>
<li aria-current="page">Services</li>
</ol>
</nav>
<h1>Service Management</h1>
<p>
                  Manage emergency service catalog, pricing and availability.
                </p>
</div>
</div>
<section class="service-workspace">
<section aria-label="Service summary" class="service-stats">
<article class="service-stat-card">
<span class="stat-icon stat-icon--primary"><i class="fa-solid fa-screwdriver-wrench"></i></span>
<div>
<p>Total Services</p>
<strong>28</strong><span>Across all categories</span>
</div>
</article>
<article class="service-stat-card">
<span class="stat-icon stat-icon--success"><i class="fa-solid fa-toggle-on"></i></span>
<div>
<p>Active Services</p>
<strong>22</strong><span>Available for booking</span>
</div>
</article>
<article class="service-stat-card">
<span class="stat-icon stat-icon--danger"><i class="fa-solid fa-toggle-off"></i></span>
<div>
<p>Inactive Services</p>
<strong>6</strong><span>Temporarily hidden</span>
</div>
</article>
<article class="service-stat-card">
<span class="stat-icon stat-icon--info"><i class="fa-solid fa-layer-group"></i></span>
<div>
<p>Categories</p>
<strong>7</strong><span>Operational groups</span>
</div>
</article>
</section>
<div class="service-toolbar">
<div class="toolbar-search">
<i class="fa-solid fa-magnifying-glass"></i><label class="sr-only" for="serviceSearch">Search Service</label><input id="serviceSearch" placeholder="Search service name or category" type="search"/>
</div>
<select aria-label="Category Filter" id="categoryFilter">
<option value="All">All Categories</option>
<option>Plumbing</option>
<option>Electrical</option>
<option>HVAC</option>
<option>Restoration</option>
<option>Inspection</option>
</select>
<select aria-label="Status Filter" id="serviceStatusFilter">
<option value="All">All Status</option>
<option>Active</option>
<option>Inactive</option>
</select>
<button class="button button--primary" data-open-add-service="" type="button">
<i class="fa-solid fa-plus"></i>Add Service
                </button>
</div>
<div class="service-layout">
<section aria-labelledby="servicesTableTitle" class="service-table-card">
<div class="table-card-header">
<div>
<h2 id="servicesTableTitle">Services</h2>
<p><span data-service-count="">0</span> records found</p>
</div>
</div>
<div class="table-responsive">
<table class="service-table">
<thead>
<tr>
<th>Service ID</th>
<th>Service Name</th>
<th>Category</th>
<th>Price</th>
<th>Duration</th>
<th>Status</th>
<th>Last Updated</th>
<th>Actions</th>
</tr>
</thead>
<tbody data-service-table=""></tbody>
</table>
</div>
<nav aria-label="Services pagination" class="pagination">
<button type="button">Previous</button><button class="pagination__page pagination__page--active" type="button">
                      1</button><button class="pagination__page" type="button">2</button><button class="pagination__page" type="button">3</button><button type="button">Next</button>
</nav>
</section>
<aside aria-live="polite" class="service-details-card">
<div class="service-image" data-detail-image="">
<i class="fa-solid fa-screwdriver-wrench"></i>
</div>
<div class="service-details-body" data-service-details=""></div>
</aside>
</div>
</section>
</div>
</template>
  <script src="../../js/app.js"></script>
  <script>
    mountShell('services').then(function () {
      var tpl = document.getElementById('page-content');
      var target = document.getElementById('content');
      target.innerHTML = tpl.innerHTML;
      tpl.remove();
      document.dispatchEvent(new CustomEvent('elrs:page-ready'));
      var s=document.createElement("script"); s.src="../../js/services.js"; document.body.appendChild(s);
    }).catch(function(err){ console.error(err); });
  </script>
</body>
</html>
