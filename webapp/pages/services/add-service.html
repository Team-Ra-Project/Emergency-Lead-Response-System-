<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Service</title>

<link rel="stylesheet" href="../../css/advanceForms.css">
<link rel="stylesheet" href="../../css/advanceFromsRes.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

</head>

<body>

<h1 class="service-title">Add Service</h1>

<div class="service-container">

<form id="serviceForm" action="/ELRS/api/services" method="post">

    <div class="service-group">
        <label for="serviceName">Service Name</label>

        <select class="service-select" id="serviceName" name="serviceName" required>

            <option value="">Select Service</option>
            <option value="Ambulance">Ambulance</option>
            <option value="Fire Rescue">Fire Rescue</option>
            <option value="Medical Assistance">Medical Assistance</option>
            <option value="Police Assistance">Police Assistance</option>

        </select>
    </div>

    <div class="service-group">
        <label for="category">Category</label>

        <select class="service-select" id="category" name="category" required>

            <option value="">Select Category</option>
            <option value="Medical">Medical</option>
            <option value="Emergency">Emergency</option>
            <option value="Security">Security</option>
            <option value="Rescue">Rescue</option>

        </select>
    </div>

    <div class="service-group service-full">
        <label for="description">Description</label>

        <textarea
            class="service-textarea"
            id="description"
            name="description"
            rows="6"
            placeholder="Enter Description"
            required></textarea>
    </div>

    <div class="service-group">
        <label for="price">Price</label>

        <input
            class="service-input"
            type="number"
            id="price"
            name="price"
            placeholder="Enter Price"
            min="0"
            required>
    </div>

    <div class="service-group">
        <label for="duration">Estimated Duration</label>

        <select class="service-select" id="duration" name="duration" required>

            <option value="">Select Duration</option>
            <option value="15 Minutes">15 Minutes</option>
            <option value="30 Minutes">30 Minutes</option>
            <option value="45 Minutes">45 Minutes</option>
            <option value="1 Hour">1 Hour</option>
            <option value="2 Hours">2 Hours</option>
            <option value="Half Day">Half Day</option>
            <option value="Full Day">Full Day</option>

        </select>
    </div>

    <div class="service-group">
        <label for="status">Status</label>

        <select class="service-select" id="status" name="status" required>

            <option value="">Select Status</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Temporarily Unavailable">Temporarily Unavailable</option>

        </select>
    </div>

    <div class="service-actions">
    
    <button type="button" class="btn-back" onclick="window.location.href='services.html'">
    ← Back 
</button>

        <button type="reset">Clear</button>

        <button type="submit">Save Service</button>

    </div>

</form>

</div>

<script src="../../js/app.js"></script>
<script src="../../js/api-core.js"></script>
<script src="../../js/service-api.js"></script>

</body>
</html>
