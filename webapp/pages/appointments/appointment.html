<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Appointments — ELRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../images/logo.png" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/tables.css" />
  <link rel="stylesheet" href="../../css/forms.css" />
  <link rel="stylesheet" href="../../css/appointment.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
</head>
<body>
  <div id="shell"></div>
  <template id="page-content">
<div class="content__inner">
<div class="page-header appointment-page-header">
<div>
<nav aria-label="Breadcrumb" class="breadcrumb">
<ol>
<li><a href="../index.html">Dashboard</a></li>
<li aria-current="page">Appointment</li>
</ol>
</nav>
<h1>Appointment Management</h1>
<p>
                  Schedule, track and manage emergency service appointments.
                </p>
</div>
</div>
<section aria-label="Appointment management workspace" class="appointment-workspace">
<section aria-label="Appointment summary" class="appointment-stats">
<article class="elrs-stat-card">
<span class="stat-icon stat-icon--primary"><i class="fa-solid fa-calendar-days"></i></span>
<div>
<p>Total Appointments</p>
<strong>142</strong><span>All scheduled visits</span>
</div>
</article>
<article class="elrs-stat-card">
<span class="stat-icon stat-icon--info"><i class="fa-solid fa-calendar-day"></i></span>
<div>
<p>Today's Appointments</p>
<strong>12</strong><span>4 urgent visits</span>
</div>
</article>
<article class="elrs-stat-card">
<span class="stat-icon stat-icon--warning"><i class="fa-solid fa-clock"></i></span>
<div>
<p>Upcoming Appointments</p>
<strong>38</strong><span>Next 7 days</span>
</div>
</article>
<article class="elrs-stat-card">
<span class="stat-icon stat-icon--success"><i class="fa-solid fa-circle-check"></i></span>
<div>
<p>Completed Appointments</p>
<strong>92</strong><span>18 this week</span>
</div>
</article>
</section>
<div class="appointment-toolbar">
<div class="toolbar-search">
<i class="fa-solid fa-magnifying-glass"></i><label class="sr-only" for="appointmentSearch">Search Appointment</label><input id="appointmentSearch" placeholder="Search appointment, customer or staff" type="search"/>
</div>
<select aria-label="Filter by status" id="appointmentStatusFilter">
<option value="All">All Status</option>
<option>Booked</option>
<option>Pending</option>
<option>Completed</option>
<option>Rescheduled</option>
<option>Cancelled</option>
</select>
<input aria-label="Filter by date" id="appointmentDateFilter" type="date"/>
<button class="button button--primary" data-open-appointment-modal="" type="button">
<i class="fa-solid fa-plus"></i>Add Appointment
                </button>
</div>
<div class="appointment-layout">
<div class="appointment-main">
<section aria-labelledby="calendarTitle" class="calendar-card">
<div class="section-header">
<div>
<h2 id="calendarTitle">Monthly Calendar</h2>
<p>Click any date to highlight availability.</p>
</div>
<div class="month-actions">
<button aria-label="Previous month" class="icon-action" data-prev-month="" type="button">
<i class="fa-solid fa-chevron-left"></i></button><strong data-calendar-month="">July 2026</strong><button aria-label="Next month" class="icon-action" data-next-month="" type="button">
<i class="fa-solid fa-chevron-right"></i>
</button>
</div>
</div>
<div class="calendar-grid" data-calendar-grid=""></div>
</section>
<section aria-labelledby="appointmentScheduleTitle">
<div class="section-header">
<div>
<h2 id="appointmentScheduleTitle">
                          Appointment Schedule
                        </h2>
<p>
<span data-appointment-count="">0</span> appointments
                          found
                        </p>
</div>
</div>
<div class="appointment-card-grid" data-appointment-list=""></div>
</section>
</div>
<aside aria-label="Upcoming schedule" class="schedule-panel">
<h2>Upcoming Schedule</h2>
<div class="schedule-group">
<h3>Today's Schedule</h3>
<div data-schedule-today=""></div>
</div>
<div class="schedule-group">
<h3>Tomorrow's Schedule</h3>
<div data-schedule-tomorrow=""></div>
</div>
<div class="schedule-group">
<h3>Upcoming Week</h3>
<div data-schedule-week=""></div>
</div>
</aside>
</div>
</section>
</div>
</template>
  <script src="../../js/app.js"></script>
  <script>
    mountShell('appointments').then(function () {
      var tpl = document.getElementById('page-content');
      var target = document.getElementById('content');
      target.innerHTML = tpl.innerHTML;
      tpl.remove();
      document.dispatchEvent(new CustomEvent('elrs:page-ready'));
      var s=document.createElement("script"); s.src="../../js/appointment.js"; document.body.appendChild(s);
    }).catch(function(err){ console.error(err); });
  </script>
</body>
</html>
